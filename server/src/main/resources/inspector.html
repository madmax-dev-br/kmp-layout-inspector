<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KMP Layout Inspector</title>
    <style>
        :root {
            --bg: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #1c2333;
            --bg-card: #21262d;
            --bg-hover: #30363d;
            --accent: #f97316;
            --accent-hover: #fb923c;
            --accent-glow: rgba(249, 115, 22, 0.15);
            --text: #e6edf3;
            --text-secondary: #8b949e;
            --text-muted: #484f58;
            --success: #3fb950;
            --success-bg: rgba(63, 185, 80, 0.1);
            --warning: #d29922;
            --error: #f85149;
            --error-bg: rgba(248, 81, 73, 0.1);
            --info: #58a6ff;
            --info-bg: rgba(88, 166, 255, 0.1);
            --border: #30363d;
            --border-light: #21262d;
            --radius: 8px;
            --radius-lg: 12px;
            --shadow: 0 2px 8px rgba(0,0,0,0.3);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.4);
            --transition: 0.2s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* ===== Scrollbar ===== */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* ===== Toolbar ===== */
        .toolbar {
            width: 100%;
            padding: 12px 20px;
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .toolbar h1 {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: -0.3px;
            color: var(--text);
        }
        .toolbar button, .toolbar select {
            padding: 6px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--bg);
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 13px;
            transition: all var(--transition);
        }
        .toolbar button:hover, .toolbar select:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-glow);
        }
        .toolbar button.active {
            background: var(--accent-glow);
            border-color: var(--accent);
            color: var(--accent);
        }
        .toolbar select { appearance: auto; }
        .toolbar select option { background: var(--bg-secondary); }
        .toolbar .status { margin-left: auto; font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
        .toolbar .status.ok { color: var(--success); }
        .toolbar .status.err { color: var(--error); }
        .strategy-label { font-size: 12px; color: var(--text-muted); }

        /* ===== Filter bar ===== */
        .filter-bar {
            width: 100%;
            padding: 6px 20px;
            background: var(--bg);
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            min-height: 34px;
        }
        .filter-bar-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            flex-shrink: 0;
        }
        .filter-tag {
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: 2px solid transparent;
            transition: all 0.15s;
            user-select: none;
            position: relative;
        }
        .filter-tag:hover { opacity: 0.85; }
        .filter-tag .filter-count {
            font-size: 9px;
            opacity: 0.7;
            margin-left: 4px;
        }

        /* ===== Content ===== */
        .content {
            display: flex;
            flex: 1;
            padding: 16px;
            gap: 16px;
            overflow: hidden;
            min-height: 0;
            position: relative;
        }

        /* ===== Device Frame ===== */
        .device-frame {
            position: relative;
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            flex-shrink: 0;
            background: #000;
            align-self: flex-start;
            box-shadow: var(--shadow);
        }
        .device-frame img {
            display: block;
            height: calc(100vh - 116px);
            width: auto;
        }
        .overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: all;
            cursor: crosshair;
        }
        .element-rect {
            position: absolute;
            pointer-events: none;
            transition: background 0.05s, outline-color 0.05s;
        }
        .element-rect.hovered {
            background: rgba(63, 185, 80, 0.2);
            outline: 2px solid var(--success);
            z-index: 10;
        }
        .element-rect.selected {
            background: rgba(88, 166, 255, 0.2);
            outline: 2px solid var(--info) !important;
            z-index: 11;
        }

        /* ===== Element Tree Panel ===== */
        .element-list-panel {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 0;
            width: 300px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
        }
        .element-list-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .element-list-header h2 {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .element-list-header span { font-size: 12px; color: var(--text-muted); }
        .search-box {
            width: calc(100% - 16px);
            margin: 8px;
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--bg);
            color: var(--text);
            font-size: 13px;
            outline: none;
            flex-shrink: 0;
            transition: border-color var(--transition);
        }
        .search-box:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        .element-list {
            flex: 1;
            overflow-y: auto;
            min-height: 0;
            padding: 4px 8px;
        }
        .el-item {
            padding: 6px 8px;
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 12px;
            font-family: 'SFMono-Regular', Consolas, 'JetBrains Mono', monospace;
            margin-bottom: 1px;
            display: flex;
            gap: 6px;
            align-items: baseline;
            white-space: nowrap;
            overflow: hidden;
            transition: background var(--transition);
        }
        .el-item:hover { background: var(--bg-hover); }
        .el-item.active {
            background: var(--accent-glow);
            border: 1px solid var(--accent);
            margin: 0 -1px 0 -1px;
        }
        .el-item .el-class { color: var(--success); }
        .el-item.component-root .el-class { color: var(--accent); font-weight: 700; }
        .el-item .el-text { color: var(--warning); overflow: hidden; text-overflow: ellipsis; }
        .el-item .el-size { color: var(--text-muted); margin-left: auto; flex-shrink: 0; }
        .el-item .tree-indent { color: var(--text-muted); flex-shrink: 0; white-space: pre; }
        .el-item .tree-toggle { flex-shrink: 0; width: 14px; cursor: pointer; color: var(--text-secondary); user-select: none; }
        .el-item .el-event-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
            display: inline-block;
        }
        .el-item .el-event-badge {
            font-size: 9px;
            color: #000;
            padding: 1px 5px;
            border-radius: 3px;
            font-weight: 700;
            flex-shrink: 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* ===== Info Panel ===== */
        .info-panel {
            flex: 1;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 0;
            overflow-y: auto;
            min-width: 280px;
            min-height: 0;
        }
        .info-panel h2 {
            font-size: 12px;
            font-weight: 600;
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            position: sticky;
            top: 0;
            background: var(--bg-secondary);
            z-index: 1;
        }
        .info-panel .placeholder { color: var(--text-muted); font-size: 13px; padding: 16px; }
        #elementInfo { padding: 16px; }
        .detail-grid {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 6px 12px;
            font-size: 13px;
        }
        .detail-label {
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 11px;
            font-weight: 600;
            align-self: center;
            letter-spacing: 0.3px;
        }
        .detail-value {
            font-family: 'SFMono-Regular', Consolas, 'JetBrains Mono', monospace;
            word-break: break-all;
            color: var(--text);
        }
        .detail-value.highlight {
            color: var(--accent);
            font-size: 16px;
            font-weight: 600;
        }
        .props-section {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }
        .props-section h3 {
            font-size: 12px;
            color: var(--info);
            text-transform: uppercase;
            margin-bottom: 6px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .prop-row {
            display: flex;
            gap: 8px;
            font-size: 12px;
            padding: 2px 0;
            font-family: 'SFMono-Regular', Consolas, 'JetBrains Mono', monospace;
        }
        .prop-key { color: var(--accent); flex-shrink: 0; }
        .prop-val { color: var(--success); word-break: break-all; }

        .json-section {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }
        .json-section h3 {
            font-size: 12px;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
            font-weight: 600;
        }
        .json-block {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 12px;
            font-family: 'SFMono-Regular', Consolas, 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--success);
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 400px;
            overflow-y: auto;
        }

        /* ===== Tooltip ===== */
        .tooltip {
            position: fixed;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 10px 14px;
            font-size: 13px;
            pointer-events: none;
            z-index: 1000;
            max-width: 360px;
            display: none;
            box-shadow: var(--shadow-lg);
        }
        .tooltip .tt-class { color: var(--accent); font-weight: 700; font-size: 14px; }
        .tooltip .tt-size { color: var(--info); margin-top: 2px; }
        .tooltip .tt-text { color: var(--warning); margin-top: 2px; }
        .tooltip .tt-id { color: var(--accent); margin-top: 2px; font-size: 12px; }
        .tooltip .tt-role { color: var(--success); margin-top: 2px; font-size: 12px; }
        .tooltip .tt-event { margin-top: 4px; padding: 4px 6px; border-radius: 4px; font-size: 11px; font-family: monospace; }

        /* ===== Annotation Cards ===== */
        .annotation-layer {
            position: relative;
            flex-shrink: 0;
            width: 0;
            min-width: 0;
            align-self: stretch;
            overflow: visible;
            transition: width 0.2s, min-width 0.2s;
        }
        .annotation-layer.has-cards {
            width: 280px;
            min-width: 280px;
        }
        .annotation-connector {
            position: absolute;
            pointer-events: none;
        }
        .annotation-card {
            position: absolute;
            left: 10px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 12px 14px;
            width: 260px;
            pointer-events: all;
            cursor: pointer;
            transition: border-color var(--transition), box-shadow var(--transition);
            box-shadow: var(--shadow);
            z-index: 20;
        }
        .annotation-card:hover {
            border-color: var(--accent);
            box-shadow: var(--shadow-lg);
        }
        .annotation-card-type {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }
        .annotation-card-component {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 6px;
        }
        .annotation-card-event {
            font-size: 11px;
            font-family: 'SFMono-Regular', Consolas, 'JetBrains Mono', monospace;
            padding: 4px 8px;
            border-radius: 6px;
            margin-bottom: 4px;
        }
        .annotation-card-event:last-child { margin-bottom: 0; }

        /* ===== Loading ===== */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 60vh;
            width: 300px;
            color: var(--text-muted);
        }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="toolbar">
        <h1>KMP Layout Inspector</h1>
        <span class="strategy-label">Strategy:</span>
        <select id="strategy">
            <option value="compose">Compose Semantics</option>
            <option value="uiautomator">UI Automator</option>
        </select>
        <button onclick="refresh()" id="btnRefresh">Refresh</button>
        <button onclick="toggleBounds()" id="btnBounds" class="active">Component Bounds</button>
        <label style="display:flex;align-items:center;gap:4px;font-size:13px;cursor:pointer;user-select:none">
            <input type="checkbox" id="allBounds" style="cursor:pointer;accent-color:#f97316" />
            All boundaries
        </label>
        <button onclick="toggleTree()" id="btnTree">Tree</button>
        <label style="display:flex;align-items:center;gap:4px;font-size:13px;cursor:pointer;user-select:none">
            <input type="checkbox" id="autoRefresh" checked style="cursor:pointer;accent-color:#f97316" />
            Auto-refresh
        </label>
        <span class="status" id="status">Connecting...</span>
    </div>
    <div class="filter-bar" id="filterBar">
        <span class="filter-bar-label">Events:</span>
        <span id="filterTags" style="display:flex;gap:6px;flex-wrap:wrap"></span>
    </div>
    <div class="content">
        <!-- LEFT: device screen -->
        <div class="device-frame" id="deviceFrame">
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <div>Capturing device screen...</div>
            </div>
            <img id="screenshot" style="display:none" />
            <div class="overlay" id="overlay"></div>
        </div>
        <!-- Annotation cards + connector lines -->
        <div class="annotation-layer" id="annotationLayer"></div>
        <svg id="connectorSvg" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:15;overflow:visible"></svg>
        <!-- MIDDLE: element list -->
        <div class="element-list-panel" id="treePanel" style="display:none">
            <div class="element-list-header">
                <h2>Elements</h2>
                <span id="elementCount">0 elements</span>
            </div>
            <input class="search-box" id="searchBox" placeholder="Filter elements..." oninput="filterElements()" />
            <div class="element-list" id="elementList"></div>
        </div>
        <!-- RIGHT: element details -->
        <div class="info-panel" id="infoPanel">
            <h2>Element Details</h2>
            <div class="placeholder" id="elementInfo">Hover over elements on the screen to inspect them. Click to pin selection.</div>
        </div>
    </div>
    <div class="tooltip" id="tooltip"></div>

    <script>
    let hierarchy = [];
    let deviceWidth = 1080;
    let deviceHeight = 2400;
    let boundsVisible = false;
    let componentBoundsVisible = true;
    let selectedIndex = -1;
    let hoveredIndex = -1;
    let componentsData = null;

    // ── Event filter system ──
    const EVENT_TYPE_COLORS = {
        'analytics': { color: '#f97316', bg: 'rgba(249,115,22,0.12)', label: 'Analytics' },
        'deeplink':  { color: '#4dd0e1', bg: 'rgba(77,208,225,0.12)', label: 'Deeplink' },
    };
    let activeEventFilters = new Set();
    // eventType -> Set of root component IDs that contain that event (recursively)
    let eventTypeIndex = {};

    function collectEventsRecursive(component) {
        let events = [...(component.events || [])];
        if (component.children && component.children.length > 0) {
            component.children.forEach(child => {
                events = events.concat(collectEventsRecursive(child));
            });
        }
        return events;
    }

    function buildEventTypeIndex(components) {
        const index = {};
        if (!components) return index;
        components.forEach(comp => {
            const allEvents = collectEventsRecursive(comp);
            allEvents.forEach(ev => {
                const t = ev.eventType;
                if (!index[t]) index[t] = new Set();
                index[t].add(comp.id);
            });
        });
        return index;
    }

    function getComponentEvents(compId, eventType) {
        if (!componentsData) return [];
        const comp = componentsData.find(c => c.id === compId);
        if (!comp) return [];
        const all = collectEventsRecursive(comp);
        return eventType ? all.filter(e => e.eventType === eventType) : all;
    }

    function getMatchingFilterColor(compId) {
        for (const t of activeEventFilters) {
            if (eventTypeIndex[t] && eventTypeIndex[t].has(compId)) {
                return EVENT_TYPE_COLORS[t] || { color: '#888', bg: 'rgba(136,136,136,0.12)' };
            }
        }
        return null;
    }

    function componentMatchesAnyFilter(compId) {
        if (activeEventFilters.size === 0) return false;
        for (const t of activeEventFilters) {
            if (eventTypeIndex[t] && eventTypeIndex[t].has(compId)) return true;
        }
        return false;
    }

    function getComponentEventTypes(compId) {
        const types = [];
        for (const [t, ids] of Object.entries(eventTypeIndex)) {
            if (ids.has(compId)) types.push(t);
        }
        return types;
    }

    function renderFilterTags() {
        const container = document.getElementById('filterTags');
        container.innerHTML = '';
        const types = Object.keys(eventTypeIndex);
        if (types.length === 0) {
            container.innerHTML = '<span style="font-size:11px;color:#555">No events found</span>';
            return;
        }
        types.forEach(t => {
            const meta = EVENT_TYPE_COLORS[t] || { color: '#888', bg: 'rgba(136,136,136,0.12)', label: t };
            const count = eventTypeIndex[t] ? eventTypeIndex[t].size : 0;
            const tag = document.createElement('span');
            tag.className = 'filter-tag';
            const isActive = activeEventFilters.has(t);
            tag.style.background = isActive ? meta.color : 'transparent';
            tag.style.color = isActive ? '#000' : meta.color;
            tag.style.borderColor = meta.color;
            tag.innerHTML = meta.label + '<span class="filter-count">' + count + '</span>';
            tag.addEventListener('click', () => {
                if (activeEventFilters.has(t)) {
                    activeEventFilters.clear();
                } else {
                    activeEventFilters.clear();
                    activeEventFilters.add(t);
                }
                renderFilterTags();
                renderOverlay();
                renderElementList();
            });
            container.appendChild(tag);
        });
    }

    function escapeHtml(str) {
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function getStrategy() {
        return document.getElementById('strategy').value;
    }

    function normalize(raw, strategy) {
        if (strategy === 'compose') {
            return raw.map(n => ({
                displayName: n.displayName || n.role || 'Node',
                text: n.text || '',
                role: n.role || '',
                testTag: n.testTag || '',
                contentDesc: n.contentDesc || '',
                mergesDescendants: n.mergesDescendants || false,
                id: n.id,
                parentId: n.parentId,
                childIds: n.childIds || [],
                componentType: n.componentType || '',
                componentId: n.componentId || '',
                isComponentRoot: n.isComponentRoot || false,
                properties: n.properties || {},
                bounds: n.bounds,
                width: n.width,
                height: n.height,
                _strategy: 'compose'
            }));
        } else {
            return raw.map(n => ({
                displayName: n.shortClass || 'View',
                text: n.text || '',
                role: '',
                testTag: '',
                contentDesc: n.contentDesc || '',
                fullClass: n.fullClass || '',
                resourceId: n.resourceId || '',
                pkg: n.pkg || '',
                properties: {},
                bounds: n.bounds,
                width: n.width,
                height: n.height,
                _strategy: 'uiautomator'
            }));
        }
    }

    async function refresh() {
        const status = document.getElementById('status');
        const btn = document.getElementById('btnRefresh');
        const strategy = getStrategy();
        status.textContent = 'Fetching...';
        status.className = 'status';
        btn.disabled = true;
        selectedIndex = -1;
        hoveredIndex = -1;

        try {
            const hierarchyEndpoint = strategy === 'compose' ? '/api/compose-tree' : '/api/hierarchy';

            const [deviceInfo, screenshotBlob, rawData, compData] = await Promise.all([
                fetch('/api/device-info').then(r => { if (!r.ok) throw new Error('Device info failed'); return r.json(); }),
                fetch('/api/screenshot').then(r => { if (!r.ok) throw new Error('Screenshot failed'); return r.blob(); }),
                fetch(hierarchyEndpoint).then(r => { if (!r.ok) throw new Error('Hierarchy failed'); return r.json(); }),
                fetch('/api/components').then(r => r.ok ? r.json() : null).catch(() => null)
            ]);
            componentsData = compData;
            eventTypeIndex = buildEventTypeIndex(compData);
            renderFilterTags();

            if (rawData && rawData.error) throw new Error(rawData.error);

            deviceWidth = deviceInfo.width;
            deviceHeight = deviceInfo.height;
            hierarchy = normalize(Array.isArray(rawData) ? rawData : [], strategy);

            const img = document.getElementById('screenshot');
            const oldSrc = img.src;
            img.src = URL.createObjectURL(screenshotBlob);
            if (oldSrc) URL.revokeObjectURL(oldSrc);

            img.onload = () => {
                document.getElementById('loading').style.display = 'none';
                img.style.display = 'block';
                renderOverlay();
                renderElementList();
            };

            const label = strategy === 'compose' ? 'Compose' : 'UIAutomator';
            status.textContent = hierarchy.length + ' elements [' + label + ']';
            status.className = 'status ok';
        } catch (err) {
            status.textContent = 'Error: ' + err.message;
            status.className = 'status err';
        } finally {
            btn.disabled = false;
        }
    }

    // ── Hit-testing: find the smallest (innermost) element at a point ──
    function hitTest(px, py) {
        const img = document.getElementById('screenshot');
        if (!img.clientWidth || !img.clientHeight) return -1;
        const scaleX = img.clientWidth / deviceWidth;
        const scaleY = img.clientHeight / deviceHeight;

        let bestIndex = -1;
        let bestArea = Infinity;

        hierarchy.forEach((el, i) => {
            if (el.width <= 0 || el.height <= 0) return;
            // When all boundaries disabled, only allow selecting component roots
            if (!boundsVisible && !el.isComponentRoot) return;
            const l = el.bounds.left * scaleX;
            const t = el.bounds.top * scaleY;
            const r = el.bounds.right * scaleX;
            const b = el.bounds.bottom * scaleY;
            if (px >= l && px <= r && py >= t && py <= b) {
                const area = el.width * el.height;
                if (area < bestArea) {
                    bestArea = area;
                    bestIndex = i;
                }
            }
        });
        return bestIndex;
    }

    function renderOverlay() {
        const overlay = document.getElementById('overlay');
        const img = document.getElementById('screenshot');
        overlay.innerHTML = '';

        const scaleX = img.clientWidth / deviceWidth;
        const scaleY = img.clientHeight / deviceHeight;

        hierarchy.forEach((el, i) => {
            if (el.width <= 0 || el.height <= 0) return;

            const rect = document.createElement('div');
            rect.className = 'element-rect';
            rect.style.left = (el.bounds.left * scaleX) + 'px';
            rect.style.top = (el.bounds.top * scaleY) + 'px';
            rect.style.width = (el.width * scaleX) + 'px';
            rect.style.height = (el.height * scaleY) + 'px';
            rect.dataset.index = i;

            // Apply event filter highlights
            const filterMatch = el.isComponentRoot && el.componentId ? getMatchingFilterColor(el.componentId) : null;
            if (filterMatch) {
                rect.style.outline = '3px solid ' + filterMatch.color;
                rect.style.background = filterMatch.bg;
                rect.dataset.filterColor = filterMatch.color;
                rect.dataset.filterBg = filterMatch.bg;
            } else if (boundsVisible) {
                rect.style.outline = '1px solid rgba(63,185,80,0.35)';
            } else if (componentBoundsVisible && el.isComponentRoot) {
                rect.style.outline = '1px solid rgba(63,185,80,0.35)';
            }
            if (i === selectedIndex) rect.classList.add('selected');

            overlay.appendChild(rect);
        });

        // Single event handlers on overlay for hit-testing
        overlay.onmousemove = (e) => {
            const oRect = overlay.getBoundingClientRect();
            const idx = hitTest(e.clientX - oRect.left, e.clientY - oRect.top);
            if (idx !== hoveredIndex) {
                if (hoveredIndex >= 0) {
                    const prev = overlay.querySelector('[data-index="' + hoveredIndex + '"]');
                    if (prev && !prev.classList.contains('selected')) prev.classList.remove('hovered');
                }
                hoveredIndex = idx;
                if (idx >= 0) {
                    const cur = overlay.querySelector('[data-index="' + idx + '"]');
                    if (cur && !cur.classList.contains('selected')) cur.classList.add('hovered');
                    showTooltipFor(e, hierarchy[idx]);
                } else {
                    hideTooltip();
                }
            } else if (idx >= 0) {
                moveTooltip(e);
            }
        };

        overlay.onmouseleave = () => {
            if (hoveredIndex >= 0) {
                const prev = overlay.querySelector('[data-index="' + hoveredIndex + '"]');
                if (prev) prev.classList.remove('hovered');
                hoveredIndex = -1;
            }
            hideTooltip();
        };

        overlay.onclick = (e) => {
            const oRect = overlay.getBoundingClientRect();
            const idx = hitTest(e.clientX - oRect.left, e.clientY - oRect.top);
            if (idx >= 0) {
                if (idx === selectedIndex) {
                    deselectElement();
                } else {
                    selectElement(idx);
                }
            }
        };

        // Render annotation cards after overlay is ready
        setTimeout(renderAnnotations, 0);
    }

    function renderAnnotations() {
        const layer = document.getElementById('annotationLayer');
        const svg = document.getElementById('connectorSvg');
        layer.innerHTML = '';
        svg.innerHTML = '';
        layer.classList.remove('has-cards');

        if (activeEventFilters.size === 0) return;

        const deviceFrame = document.getElementById('deviceFrame');
        const contentEl = document.querySelector('.content');
        const img = document.getElementById('screenshot');
        if (!img.clientWidth || !img.clientHeight) return;

        const scaleX = img.clientWidth / deviceWidth;
        const scaleY = img.clientHeight / deviceHeight;
        const contentRect = contentEl.getBoundingClientRect();
        const frameRect = deviceFrame.getBoundingClientRect();

        // Collect matching components with their positions
        const annotations = [];
        const activeType = activeEventFilters.values().next().value;
        const meta = EVENT_TYPE_COLORS[activeType] || { color: '#888', bg: 'rgba(136,136,136,0.12)', label: activeType };

        hierarchy.forEach((el, i) => {
            if (!el.isComponentRoot || !el.componentId) return;
            if (!componentMatchesAnyFilter(el.componentId)) return;

            const centerY = (el.bounds.top + el.bounds.bottom) / 2 * scaleY;
            const rightX = el.bounds.right * scaleX;
            const evts = getComponentEvents(el.componentId, activeType);

            annotations.push({
                index: i,
                el: el,
                centerY: centerY,
                rightX: rightX,
                events: evts,
                componentType: el.componentType || el.displayName
            });
        });

        if (annotations.length === 0) {
            layer.classList.remove('has-cards');
            return;
        }

        layer.classList.add('has-cards');

        // Sort by Y position
        annotations.sort((a, b) => a.centerY - b.centerY);

        // Place cards at component Y positions, push down to avoid overlap
        const cardGap = 8;
        let nextY = 0;

        annotations.forEach((ann, idx) => {
            const card = document.createElement('div');
            card.className = 'annotation-card';
            card.style.borderLeft = '3px solid ' + meta.color;

            let html = '<div class="annotation-card-type" style="color:' + meta.color + '">' + meta.label + '</div>';
            html += '<div class="annotation-card-component">' + escapeHtml(ann.componentType) + ' <span style="color:#8b949e;font-size:11px;font-weight:400">' + escapeHtml(ann.el.componentId) + '</span></div>';

            ann.events.forEach(ev => {
                html += '<div class="annotation-card-event" style="background:' + meta.color + '15;border-left:2px solid ' + meta.color + ';color:' + meta.color + '">';
                if (ev.eventType === 'analytics') {
                    html += escapeHtml(ev.eventName);
                    if (ev.params && Object.keys(ev.params).length > 0) {
                        html += ' <span style="opacity:0.6;color:#8b949e">(' + Object.entries(ev.params).map(([k,v]) => k+'='+v).join(', ') + ')</span>';
                    }
                } else if (ev.eventType === 'deeplink') {
                    html += escapeHtml(ev.url);
                }
                html += '</div>';
            });

            card.innerHTML = html;
            card.addEventListener('click', () => selectElement(ann.index));

            // Position at component's Y, but push down if overlapping previous card
            const desiredY = ann.centerY - 20;
            const cardY = Math.max(nextY, desiredY);
            card.style.top = cardY + 'px';
            ann._cardY = cardY;

            layer.appendChild(card);

            const cardHeight = card.offsetHeight || 60;
            nextY = cardY + cardHeight + cardGap;
        });

        // Draw SVG connectors
        requestAnimationFrame(() => {
            const layerRect = layer.getBoundingClientRect();

            annotations.forEach((ann, idx) => {
                const fromX = frameRect.left - contentRect.left + ann.rightX;
                const fromY = frameRect.top - contentRect.top + ann.centerY;
                const toX = layerRect.left - contentRect.left + 10;
                const cardHeight = layer.querySelectorAll('.annotation-card')[idx]?.offsetHeight || 60;
                const toY = frameRect.top - contentRect.top + ann._cardY + Math.min(cardHeight / 2, 20);

                const midX = (fromX + toX) / 2;
                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('d', 'M' + fromX + ',' + fromY + ' C' + midX + ',' + fromY + ' ' + midX + ',' + toY + ' ' + toX + ',' + toY);
                path.setAttribute('stroke', meta.color);
                path.setAttribute('stroke-width', '1.5');
                path.setAttribute('fill', 'none');
                path.setAttribute('stroke-opacity', '0.6');
                svg.appendChild(path);

                const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                circle.setAttribute('cx', fromX);
                circle.setAttribute('cy', fromY);
                circle.setAttribute('r', '3');
                circle.setAttribute('fill', meta.color);
                circle.setAttribute('fill-opacity', '0.8');
                svg.appendChild(circle);
            });
        });

    }

    function showTooltipFor(e, el) {
        const tt = document.getElementById('tooltip');
        let html = '<div class="tt-class">' + el.displayName + '</div>';
        html += '<div class="tt-size">' + el.width + ' \u00d7 ' + el.height + ' px</div>';
        if (el.text) html += '<div class="tt-text">"' + el.text.substring(0, 60) + '"</div>';
        if (el._strategy === 'compose') {
            if (el.role && el.role !== el.displayName) html += '<div class="tt-role">Role: ' + el.role + '</div>';
        } else {
            if (el.resourceId) html += '<div class="tt-id">' + el.resourceId.split('/').pop() + '</div>';
        }
        // Show event preview if component has events matching active filters
        if (el.componentId && activeEventFilters.size > 0) {
            for (const t of activeEventFilters) {
                const evts = getComponentEvents(el.componentId, t);
                if (evts.length > 0) {
                    const meta = EVENT_TYPE_COLORS[t] || { color: '#888', label: t };
                    evts.forEach(ev => {
                        html += '<div class="tt-event" style="background:' + meta.color + '22;border-left:3px solid ' + meta.color + ';color:' + meta.color + '">';
                        if (ev.eventType === 'analytics') {
                            html += '<b>' + meta.label + ':</b> ' + escapeHtml(ev.eventName);
                            if (ev.params && Object.keys(ev.params).length > 0) {
                                html += ' <span style="opacity:0.7">(' + Object.entries(ev.params).map(([k,v]) => k+'='+v).join(', ') + ')</span>';
                            }
                        } else if (ev.eventType === 'deeplink') {
                            html += '<b>' + meta.label + ':</b> ' + escapeHtml(ev.url);
                        }
                        html += '</div>';
                    });
                }
            }
        }
        tt.innerHTML = html;
        tt.style.display = 'block';
        moveTooltip(e);
    }

    function moveTooltip(e) {
        const tt = document.getElementById('tooltip');
        let x = e.clientX + 15;
        let y = e.clientY + 15;
        if (x + 360 > window.innerWidth) x = e.clientX - 360 - 15;
        if (y + 200 > window.innerHeight) y = e.clientY - 200 - 15;
        tt.style.left = x + 'px';
        tt.style.top = y + 'px';
    }

    function hideTooltip() {
        document.getElementById('tooltip').style.display = 'none';
    }

    function deselectElement() {
        selectedIndex = -1;
        document.querySelectorAll('.element-rect').forEach(r => {
            r.classList.remove('selected');
            r.classList.remove('hovered');
        });
        document.querySelectorAll('.el-item').forEach(r => r.classList.remove('active'));
        document.getElementById('elementInfo').innerHTML = '<div class="placeholder">Hover over elements on the screen to inspect them. Click to pin selection.</div>';
        renderOverlay();
    }

    function selectElement(index) {
        selectedIndex = index;
        const el = hierarchy[index];

        // Update overlay highlights
        document.querySelectorAll('.element-rect').forEach(r => {
            r.classList.remove('selected');
            r.classList.remove('hovered');
        });
        const rect = document.querySelector('.element-rect[data-index="' + index + '"]');
        if (rect) rect.classList.add('selected');

        // Update list highlights
        document.querySelectorAll('.el-item').forEach(r => r.classList.remove('active'));
        const listItem = document.querySelector('.el-item[data-index="' + index + '"]');
        if (listItem) {
            listItem.classList.add('active');
            listItem.scrollIntoView({ block: 'nearest' });
        }

        // Build detail panel
        const info = document.getElementById('elementInfo');
        let html = '<div class="detail-grid">';
        html += '<div class="detail-label">Type</div><div class="detail-value highlight">' + el.displayName + '</div>';

        if (el._strategy === 'compose') {
            if (el.componentType) html += '<div class="detail-label">Component</div><div class="detail-value" style="color:#f97316;font-weight:600">' + el.componentType + '</div>';
            if (el.componentId) html += '<div class="detail-label">Component ID</div><div class="detail-value" style="color:#f97316;font-size:11px">' + el.componentId + '</div>';
            if (el.role) html += '<div class="detail-label">Role</div><div class="detail-value" style="color:#3fb950">' + el.role + '</div>';
            if (el.text) html += '<div class="detail-label">Text</div><div class="detail-value" style="color:#d29922">"' + el.text + '"</div>';
            if (el.contentDesc) html += '<div class="detail-label">Description</div><div class="detail-value">' + el.contentDesc + '</div>';
            if (el.testTag) html += '<div class="detail-label">Test Tag</div><div class="detail-value" style="color:#58a6ff">' + el.testTag + '</div>';
            html += '<div class="detail-label">Node ID</div><div class="detail-value">' + el.id + '</div>';
            if (el.parentId >= 0) html += '<div class="detail-label">Parent ID</div><div class="detail-value">' + el.parentId + '</div>';
            html += '<div class="detail-label">Children</div><div class="detail-value">' + (el.childIds ? el.childIds.length : 0) + '</div>';
            if (el.mergesDescendants) html += '<div class="detail-label">Merging</div><div class="detail-value" style="color:#f97316">true</div>';
        } else {
            if (el.fullClass) html += '<div class="detail-label">Full Class</div><div class="detail-value">' + el.fullClass + '</div>';
            if (el.text) html += '<div class="detail-label">Text</div><div class="detail-value" style="color:#d29922">"' + el.text + '"</div>';
            if (el.resourceId) html += '<div class="detail-label">Resource ID</div><div class="detail-value" style="color:#58a6ff">' + el.resourceId + '</div>';
            if (el.contentDesc) html += '<div class="detail-label">Description</div><div class="detail-value">' + el.contentDesc + '</div>';
            if (el.pkg) html += '<div class="detail-label">Package</div><div class="detail-value">' + el.pkg + '</div>';
        }

        html += '<div class="detail-label">Position</div><div class="detail-value">(' + el.bounds.left + ', ' + el.bounds.top + ')</div>';
        html += '<div class="detail-label">Size</div><div class="detail-value" style="color:#58a6ff">' + el.width + ' \u00d7 ' + el.height + ' px</div>';
        html += '<div class="detail-label">Bounds</div><div class="detail-value">[' + el.bounds.left + ',' + el.bounds.top + '][' + el.bounds.right + ',' + el.bounds.bottom + ']</div>';
        html += '</div>';

        if (el._strategy === 'compose' && el.properties && Object.keys(el.properties).length > 0) {
            html += '<div class="props-section"><h3>Semantic Properties</h3>';
            for (const [key, val] of Object.entries(el.properties)) {
                html += '<div class="prop-row"><span class="prop-key">' + key + ':</span><span class="prop-val">' + val + '</span></div>';
            }
            html += '</div>';
        }

        // Show events and JSON for the component
        if (componentsData && el.componentId) {
            const comp = componentsData.find(c => c.id === el.componentId);
            if (comp) {
                const allEvents = collectEventsRecursive(comp);
                if (allEvents.length > 0) {
                    html += '<div class="json-section"><h3 style="color:#f97316">Events (' + allEvents.length + ')</h3>';
                    allEvents.forEach(ev => {
                        const meta = EVENT_TYPE_COLORS[ev.eventType] || { color: '#888', label: ev.eventType };
                        html += '<div style="margin-bottom:6px;padding:8px;background:#161b22;border:1px solid #30363d;border-radius:8px;border-left:3px solid ' + meta.color + '">';
                        html += '<div style="font-size:11px;color:' + meta.color + ';font-weight:700;text-transform:uppercase;margin-bottom:4px">' + meta.label + '</div>';
                        if (ev.eventType === 'analytics') {
                            html += '<div style="font-size:12px;font-family:monospace;color:#3fb950">' + escapeHtml(ev.eventName) + '</div>';
                            if (ev.params && Object.keys(ev.params).length > 0) {
                                for (const [k, v] of Object.entries(ev.params)) {
                                    html += '<div class="prop-row"><span class="prop-key">' + escapeHtml(k) + ':</span><span class="prop-val">' + escapeHtml(v) + '</span></div>';
                                }
                            }
                        } else if (ev.eventType === 'deeplink') {
                            html += '<div style="font-size:12px;font-family:monospace;color:#58a6ff">' + escapeHtml(ev.url) + '</div>';
                        }
                        html += '</div>';
                    });
                    html += '</div>';
                }
                html += '<div class="json-section"><h3>SDUI Component JSON</h3>';
                html += '<div class="json-block">' + escapeHtml(JSON.stringify(comp, null, 2)) + '</div>';
                html += '</div>';
            }
        }

        info.innerHTML = html;
    }

    // Collapsed node IDs (by semantics id)
    let collapsedNodes = new Set();

    function renderElementList() {
        const list = document.getElementById('elementList');
        list.innerHTML = '';
        const visible = hierarchy.filter(el => el.width > 0 && el.height > 0);
        document.getElementById('elementCount').textContent = visible.length + ' elements';

        const strategy = getStrategy();
        if (strategy === 'compose' && hierarchy.length > 0 && hierarchy[0]._strategy === 'compose') {
            renderComposeTree(list);
        } else {
            renderFlatList(list);
        }
    }

    function renderFlatList(list) {
        hierarchy.forEach((el, i) => {
            if (el.width <= 0 || el.height <= 0) return;
            list.appendChild(createElItem(el, i, 0, false));
        });
    }

    function renderComposeTree(list) {
        const idToIndex = {};
        hierarchy.forEach((el, i) => { idToIndex[el.id] = i; });

        const roots = [];
        hierarchy.forEach((el, i) => {
            if (el.parentId == null || el.parentId < 0 || idToIndex[el.parentId] === undefined) {
                roots.push(i);
            }
        });

        function renderSubtree(idx, depth) {
            const el = hierarchy[idx];
            if (!el || (el.width <= 0 && el.height <= 0)) return;

            const hasChildren = el.childIds && el.childIds.length > 0;
            const isCollapsed = collapsedNodes.has(el.id);
            const item = createElItem(el, idx, depth, hasChildren, isCollapsed);
            list.appendChild(item);

            if (hasChildren && !isCollapsed) {
                for (const childId of el.childIds) {
                    const childIdx = idToIndex[childId];
                    if (childIdx !== undefined) {
                        renderSubtree(childIdx, depth + 1);
                    }
                }
            }
        }

        roots.forEach(idx => renderSubtree(idx, 0));
    }

    function createElItem(el, i, depth, hasChildren, isCollapsed) {
        const item = document.createElement('div');
        item.className = 'el-item';
        if (el.isComponentRoot) item.classList.add('component-root');

        // Determine event types present on this component
        const compEventTypes = (el.isComponentRoot && el.componentId) ? getComponentEventTypes(el.componentId) : [];
        const matchesFilter = el.isComponentRoot && el.componentId && componentMatchesAnyFilter(el.componentId);

        if (matchesFilter) {
            const fc = getMatchingFilterColor(el.componentId);
            if (fc) item.style.borderLeft = '3px solid ' + fc.color;
        }

        item.dataset.index = i;
        item.dataset.search = [el.displayName, el.text, el.role, el.testTag || '', el.resourceId || '', el.componentType || ''].join(' ').toLowerCase();

        let html = '';
        if (depth > 0) {
            html += '<span class="tree-indent">' + '\u2502 '.repeat(depth - 1) + '\u251c ' + '</span>';
        }
        if (hasChildren) {
            html += '<span class="tree-toggle">' + (isCollapsed ? '\u25b6' : '\u25bc') + '</span>';
        } else if (depth > 0) {
            html += '<span class="tree-toggle"> </span>';
        }
        html += '<span class="el-class">' + el.displayName + '</span>';

        // Show colored dots for each event type this component has
        if (el.isComponentRoot && compEventTypes.length > 0) {
            compEventTypes.forEach(t => {
                const meta = EVENT_TYPE_COLORS[t] || { color: '#888', label: t };
                html += '<span class="el-event-dot" style="background:' + meta.color + '" title="' + meta.label + '"></span>';
            });
        }

        // Show badge when filter is active and this component matches
        if (matchesFilter) {
            const fc = getMatchingFilterColor(el.componentId);
            if (fc) html += '<span class="el-event-badge" style="background:' + fc.color + '">' + activeEventFilters.values().next().value + '</span>';
        }

        if (el.text) {
            html += '<span class="el-text">"' + el.text.substring(0, 25) + '"</span>';
        } else if (el._strategy === 'compose' && el.testTag) {
            html += '<span class="el-text">#' + el.testTag + '</span>';
        } else if (el.resourceId) {
            html += '<span class="el-text">' + el.resourceId.split('/').pop() + '</span>';
        }
        html += '<span class="el-size">' + el.width + '\u00d7' + el.height + '</span>';
        item.innerHTML = html;

        if (i === selectedIndex) item.classList.add('active');

        item.addEventListener('click', (e) => {
            if (e.target.classList.contains('tree-toggle') && hasChildren) {
                if (collapsedNodes.has(el.id)) {
                    collapsedNodes.delete(el.id);
                } else {
                    collapsedNodes.add(el.id);
                }
                renderElementList();
                return;
            }
            if (i === selectedIndex) {
                deselectElement();
            } else {
                selectElement(i);
            }
        });
        item.addEventListener('mouseenter', () => highlightOverlayRect(i, true));
        item.addEventListener('mouseleave', () => highlightOverlayRect(i, false));

        return item;
    }

    function highlightOverlayRect(i, on) {
        const rect = document.querySelector('.element-rect[data-index="' + i + '"]');
        if (!rect || rect.classList.contains('selected')) return;
        if (on) {
            rect.style.outline = '2px solid #f97316';
            rect.style.background = 'rgba(249,115,22,0.2)';
        } else {
            // Restore filter highlight or default
            if (rect.dataset.filterColor) {
                rect.style.outline = '2px solid ' + rect.dataset.filterColor;
                rect.style.background = rect.dataset.filterBg || 'transparent';
            } else {
                const el = hierarchy[i];
                const showBound = boundsVisible || (componentBoundsVisible && el && el.isComponentRoot);
                rect.style.outline = showBound ? '1px solid rgba(63,185,80,0.35)' : 'none';
                rect.style.background = 'transparent';
            }
        }
    }

    function filterElements() {
        const q = document.getElementById('searchBox').value.toLowerCase();
        document.querySelectorAll('.el-item').forEach(item => {
            item.style.display = item.dataset.search.includes(q) ? '' : 'none';
        });
    }

    function toggleBounds() {
        componentBoundsVisible = !componentBoundsVisible;
        document.getElementById('btnBounds').classList.toggle('active', componentBoundsVisible);
        renderOverlay();
    }

    function toggleTree() {
        const panel = document.getElementById('treePanel');
        const btn = document.getElementById('btnTree');
        const visible = panel.style.display !== 'none';
        panel.style.display = visible ? 'none' : '';
        btn.classList.toggle('active', !visible);
    }

    document.getElementById('allBounds').addEventListener('change', (e) => {
        boundsVisible = e.target.checked;
        renderOverlay();
    });

    let resizeTimer;
    window.addEventListener('resize', () => { clearTimeout(resizeTimer); resizeTimer = setTimeout(() => { renderOverlay(); }, 100); });

    // ── Auto-refresh on interaction idle ──
    let lastRefreshedGeneration = -1;
    let autoRefreshPolling = null;
    let isRefreshing = false;

    function startAutoRefreshPolling() {
        if (autoRefreshPolling) return;
        autoRefreshPolling = setInterval(async () => {
            if (!document.getElementById('autoRefresh').checked) return;
            if (isRefreshing) return;
            try {
                const res = await fetch('/api/interaction-status');
                const data = await res.json();
                if (data.idle && data.generation > lastRefreshedGeneration) {
                    lastRefreshedGeneration = data.generation;
                    isRefreshing = true;
                    await refresh();
                    isRefreshing = false;
                }
            } catch (_) {}
        }, 500);
    }

    document.getElementById('autoRefresh').addEventListener('change', (e) => {
        if (e.target.checked) {
            lastRefreshedGeneration = -1;
            startAutoRefreshPolling();
        }
    });

    startAutoRefreshPolling();
    refresh();
    </script>
</body>
</html>
